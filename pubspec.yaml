name: smart_iot_interface
description: "Smart IoT Interface — SmartWater Level Control BD v1.0.2 — BLE Provisioning, Firebase RTDB, Bilingual EN/BN, Auto Country Code"
version: 1.0.7+8
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

generate: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase (FREE Spark tier) ────────────────────────────────────────────
  firebase_core:        ^3.6.0
  firebase_auth:        ^5.3.1
  firebase_database:    ^11.1.4
  firebase_crashlytics: ^4.1.0
  firebase_messaging:   ^15.1.3

  # ── Google Sign-In ─────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Crypto (SHA-256 for per-device BLE PoP derivation, [FIX-POP-1]) ────────
  crypto: ^3.0.3

  # ── State management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Storage ───────────────────────────────────────────────────────────────
  shared_preferences:     ^2.3.2
  flutter_secure_storage: ^9.2.2

  # ── Network connectivity monitoring ───────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── i18n ─────────────────────────────────────────────────────────────────
  intl:         ^0.20.2

  # ── Utilities ─────────────────────────────────────────────────────────────
  url_launcher:      ^6.3.1
  package_info_plus: ^8.1.2

  # ── Offline cache ─────────────────────────────────────────────────────────
  hive:         ^2.2.3
  hive_flutter: ^1.1.0

  # ── Analytics charts ──────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Local notifications ───────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.4

  # ── BLE Provisioning — Espressif Official Native SDK ─────────────────────
  # ✅ flutter_esp_ble_prov: Real Espressif native Android/iOS SDK embedded
  # ✅ AGP 8+ compatible (uses namespace, not package attribute)
  # ✅ Verified: 37,000+ downloads, actively maintained
  # ✅ API: FlutterEspBleProv().scanBleDevices(prefix)
  #          FlutterEspBleProv().scanWifiNetworks(deviceName, pop)
  #          FlutterEspBleProv().provisionWifi(deviceName, pop, ssid, pass)
  # JitPack required in android/settings.gradle.kts (already present)
  flutter_esp_ble_prov: ^0.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  # ==================================================
  # FONTS - SpaceGrotesk (Fixes font loading error)
  # ==================================================
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Light.ttf
          weight: 300
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600

  assets:
    - assets/images/
    - assets/fonts/